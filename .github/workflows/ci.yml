name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The runner installs nightly with rustup's minimal profile, which
      # omits rustfmt; add it explicitly.
      - run: rustup toolchain install nightly --profile minimal --component rustfmt
      - run: cargo +nightly fmt --check

  # clippy/test/doc/e2e all compile moraine-duckdb, whose build.rs fetches
  # DuckDB's src/include/ header tree from GitHub on a cold cache (a ~9 MB
  # git sparse checkout into target/duckdb-src/ — see that crate's README,
  # "Where the headers come from") and compiles the DuckDB amalgamation
  # into a static archive there (minutes of compile — see "Why DuckDB is
  # statically linked"). target/duckdb-src/ is cached with its own
  # actions/cache step, not rust-cache's cache-directories: rust-cache's
  # post-step cleanup deletes directories under target/ it doesn't
  # recognize, so the extra step must be declared *after* rust-cache —
  # post steps run in reverse order, making its save fire before that
  # cleanup. Keyed on DUCKDB_VERSION, the single source of the DuckDB pin.
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: target/duckdb-src
          key: duckdb-src-${{ runner.os }}-${{ hashFiles('DUCKDB_VERSION') }}
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: target/duckdb-src
          key: duckdb-src-${{ runner.os }}-${{ hashFiles('DUCKDB_VERSION') }}
      - run: cargo test --workspace --locked

  doc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: target/duckdb-src
          key: duckdb-src-${{ runner.os }}-${{ hashFiles('DUCKDB_VERSION') }}
      - run: cargo doc --workspace --no-deps

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: target/duckdb-src
          key: duckdb-src-${{ runner.os }}-${{ hashFiles('DUCKDB_VERSION') }}
      # The pinned DuckDB CLI xtask downloads (~20 MB, re-fetched every run
      # otherwise, for the same rust-cache cleanup reason). Keyed on
      # DUCKDB_VERSION, the single source of the DuckDB pin.
      - uses: actions/cache@v4
        with:
          path: target/duckdb-cli/cli
          key: duckdb-cli-${{ runner.os }}-${{ hashFiles('DUCKDB_VERSION') }}
      - run: cargo xtask e2e

  s3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      # The pinned MinIO binaries xtask downloads, keyed on
      # xtask/src/main.rs, which owns those pins (same rust-cache cleanup
      # caveat as the DuckDB CLI cache above).
      - uses: actions/cache@v4
        with:
          path: target/minio/bin
          key: minio-${{ runner.os }}-${{ hashFiles('xtask/src/main.rs') }}
      - run: cargo xtask s3
