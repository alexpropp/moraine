name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The runner installs nightly with rustup's minimal profile, which
      # omits rustfmt; add it explicitly.
      - run: rustup toolchain install nightly --profile minimal --component rustfmt
      - run: cargo +nightly fmt --check

  # moraine-duckdb is a pure Rust static library (the C++ shim and DuckDB
  # link are owned by the extension toolchain, exercised only by the e2e
  # job), so clippy/test/doc need no DuckDB checkout or build.
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked

  doc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  # e2e builds the loadable extension through the DuckDB toolchain (`make
  # release`), which compiles DuckDB from the `duckdb` submodule and links
  # moraine's Rust core — so it needs the submodules, a ninja generator,
  # and a cache of the toolchain build tree.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      # The DuckDB toolchain build tree (keyed on the submodule refs and the
      # C++ shim), declared after rust-cache so its save fires before
      # rust-cache's post-step cleanup of unrecognized target/ dirs.
      - uses: actions/cache@v6
        with:
          path: build
          key: duckdb-build-${{ runner.os }}-${{ hashFiles('.gitmodules', 'CMakeLists.txt', 'extension_config.cmake', 'crates/moraine-duckdb/cpp/**') }}
          # Fall back to the newest prior build tree when the key changes (a
          # cpp/cmake/submodule touch) so cargo goes incremental instead of
          # cold-rebuilding the whole dependency graph.
          restore-keys: |
            duckdb-build-${{ runner.os }}-
      # The pinned DuckDB CLI xtask downloads, keyed on xtask/src/duckdb.rs,
      # which owns the pin.
      - uses: actions/cache@v6
        with:
          path: target/duckdb-cli/cli
          key: duckdb-cli-${{ runner.os }}-${{ hashFiles('xtask/src/duckdb.rs') }}
      - run: cargo xtask e2e

  s3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      # The pinned MinIO binaries xtask downloads, keyed on
      # xtask/src/s3.rs, which owns those pins (same rust-cache cleanup
      # caveat as the DuckDB build cache above).
      - uses: actions/cache@v6
        with:
          path: target/minio/bin
          key: minio-${{ runner.os }}-${{ hashFiles('xtask/src/s3.rs') }}
      - run: cargo xtask s3
