name: Extension

# Builds the loadable extension for every supported DuckDB platform through
# DuckDB's own extension-ci-tools distribution workflow — the same toolchain
# the community-extensions repository uses. Runs on release tags and on demand.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build (extension-ci-tools)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.4
    with:
      extension_name: moraine
      duckdb_version: v1.5.4
      ci_tools_version: v1.5.4
      enable_rust: true
      # moraine's Rust core (tokio, object_store, SlateDB) does not target
      # WebAssembly, and Windows is unverified; the community build excludes
      # the same set.
      exclude_archs: "wasm_mvp;wasm_eh;wasm_threads;windows_amd64;windows_amd64_mingw"
