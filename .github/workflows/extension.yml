name: Extension

# Build the extension for every platform and publish an UNSIGNED ext-v* release
# from a dispatched tag. This is the decoupled path: a first extension release
# for an already-published crate, or a rebuild (ext-v<version>-build.N) after a
# build fix or DuckDB bump with no crate change. Full releases go through
# release.yml. There is deliberately no tag-push trigger: the release-publishing
# action creates the tag, which would otherwise double-fire this build.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Extension release tag, e.g. ext-v0.1.0 or ext-v0.1.0-build.2"
        required: true

jobs:
  build:
    name: Build (extension-ci-tools)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.5
    with:
      extension_name: moraine
      duckdb_version: v1.5.4
      ci_tools_version: v1.5.4
      enable_rust: true
      # moraine's Rust core (tokio, object_store, SlateDB) does not target
      # WebAssembly, and Windows is unverified; the community build excludes
      # the same set.
      exclude_archs: "wasm_mvp;wasm_eh;wasm_threads;windows_amd64;windows_amd64_mingw"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - uses: ./.github/actions/publish-extension-release
        with:
          tag: ${{ inputs.tag }}
          target: ${{ github.sha }}
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
