name: Release

# Dormant until first release: manual trigger only. At first release, change
# to `push: { branches: [main] }` and add CARGO_REGISTRY_TOKEN to repo secrets.
on:
  workflow_dispatch:

jobs:
  release-plz:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
