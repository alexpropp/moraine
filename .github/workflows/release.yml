name: Release

# Every push to main runs release-plz: it maintains a release PR (version
# bump + changelog); merging that PR publishes to crates.io, tags
# `v<version>`, and creates the GitHub release the extension workflow
# attaches artifacts to. Needs CARGO_REGISTRY_TOKEN in repo secrets.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  release-plz:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
