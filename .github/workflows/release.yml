name: Release

# Every push to main runs release-plz: it maintains a release PR (version
# bump + changelog); merging that PR publishes to crates.io, tags
# `v<version>`, and creates the GitHub release the extension workflow
# attaches artifacts to.
#
# Requires two repo secrets:
#   CARGO_REGISTRY_TOKEN — crates.io publish token.
#   RELEASE_PLZ_TOKEN    — a PAT (or GitHub App token) with contents:write
#     and pull-requests:write. Used instead of the built-in GITHUB_TOKEN so
#     the release PR and release-tag push trigger the other workflows (CI,
#     PR-title check, extension build); GITHUB_TOKEN-authored events do not.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  release-plz:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      # release-plz refreshes the release PR in a fresh temp clone that fetches
      # `main` over HTTPS. That clone inherits only global git config, not the
      # checkout's persisted credentials, so give it the token globally.
      - name: Authenticate git so release-plz can fetch main into the PR branch
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.RELEASE_PLZ_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"
      - uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
