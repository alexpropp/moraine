[workspace]
changelog_update = true
semver_check = true

[[package]]
name = "moraine"
# The extension release references the released commit; the crate tag is fixed.
git_tag_name = "v{{ version }}"

[[package]]
name = "moraine-duckdb"
# Distributed as a prebuilt .duckdb_extension artifact, not a crate.
release = false
publish = false

[[package]]
name = "xtask"
release = false
publish = false
