# Generates cpp/moraine_abi.h from the crate's `extern "C"` surface; see
# build.rs.

language = "C"
pragma_once = true
include_version = false
cpp_compat = true
documentation = true
documentation_style = "c99"
usize_is_size_t = true
style = "both"

header = """
// C declarations for the Rust ABI exported by moraine-duckdb (src/abi.rs,
// src/error.rs, src/runtime.rs, src/dumps/, src/staged.rs, src/inline.rs,
// src/arrow_ipc.rs).
//
// GENERATED by build.rs via cbindgen — do not edit. Change the Rust
// definitions and rebuild; every struct here matches its `#[repr(C)]`
// counterpart field for field, in declaration order.
"""

after_includes = """
// The Arrow C Data Interface structs are defined by the embedder (DuckDB's
// Arrow headers); named here only.
typedef struct ArrowSchema ArrowSchema;
typedef struct ArrowArray ArrowArray;

// Mirrors `moraine_duckdb::error::codes` — pinned wire values.
enum {
	MORAINE_OK = 0,
	MORAINE_NOT_FOUND = 1,
	MORAINE_ALREADY_EXISTS = 2,
	MORAINE_CONSTRAINT = 3,
	MORAINE_COMMIT_CONFLICT = 4,
	MORAINE_CORRUPTION = 5,
	MORAINE_STORE = 6,
	MORAINE_INVALID_ARGUMENT = 7,
	MORAINE_INTERNAL = 8,
	MORAINE_INTERRUPTED = 9,
};
"""

[parse]
parse_deps = false

[export]
# The Rust-side `codes` consts would export as unprefixed `#define OK 0`
# macros; the `MORAINE_*` enum in `after_includes` is their C surface.
exclude = [
    "OK",
    "NOT_FOUND",
    "ALREADY_EXISTS",
    "CONSTRAINT",
    "COMMIT_CONFLICT",
    "CORRUPTION",
    "STORE",
    "INVALID_ARGUMENT",
    "INTERNAL",
    "INTERRUPTED",
]

[export.rename]
"FFI_ArrowSchema" = "ArrowSchema"
"FFI_ArrowArray" = "ArrowArray"
